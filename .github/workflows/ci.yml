name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-lint-and-test:
    name: Server - Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Run tests
        working-directory: server
        run: npm test
        env:
          JWT_SECRET: ci-test-secret-at-least-16-chars
          DATABASE_URL: "file:./test.db"
          NODE_ENV: test

  client-lint-and-build:
    name: Client - Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Run tests
        working-directory: client
        run: npm test

      - name: Build
        working-directory: client
        run: npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit server dependencies
        working-directory: server
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Audit client dependencies
        working-directory: client
        run: npm audit --audit-level=moderate
        continue-on-error: true
