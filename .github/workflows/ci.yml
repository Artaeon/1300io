name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-lint-and-test:
    name: Server - Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: onorm1300_test
          POSTGRES_USER: onorm1300
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onorm1300 -d onorm1300_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      JWT_SECRET: ci-test-secret-at-least-16-chars
      DATABASE_URL: postgresql://onorm1300:ci@localhost:5432/onorm1300_test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Apply migrations
        working-directory: server
        run: npx prisma migrate deploy

      - name: Lint
        working-directory: server
        run: npm run lint

      - name: Typecheck
        working-directory: server
        run: npm run typecheck

      - name: Build
        working-directory: server
        run: npm run build

      - name: Run tests
        working-directory: server
        run: npm test

  client-lint-and-build:
    name: Client - Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Run tests
        working-directory: client
        run: npm test

      - name: Build
        working-directory: client
        run: npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit server dependencies
        working-directory: server
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Audit client dependencies
        working-directory: client
        run: npm audit --audit-level=moderate
        continue-on-error: true
