server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide the nginx version in the Server header.
    server_tokens off;

    # Request body: large enough for photo uploads (10MB app limit
    # is enforced at the Node layer; add headroom here for overhead).
    client_max_body_size 12m;
    # Slow-loris protection.
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 20s;
    keepalive_timeout 30s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # --- Default security headers for HTML responses ---
    # CSP is not set here: the API proxy at /api/docs needs a looser
    # policy and the JSON API sets its own. For SPA routes, these
    # defaults are appropriate.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    # HSTS is safe behind HTTPS-terminating upstream; harmless over
    # plain HTTP (browsers ignore it). 1-year max-age + includeSubDomains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Block direct access to dotfiles and common backup suffixes.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* \.(bak|old|orig|save|swp|tmp)$ {
        deny all;
    }

    # SPA routing — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the server
    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        # The upstream already sets CSP/HSTS; avoid duplicating.
    }

    # Proxy uploaded files to the server
    location /uploads/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-assert security headers on these responses too
        add_header X-Content-Type-Options "nosniff" always;
    }
}
