version: 2

updates:
  # Server dependencies
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    open-pull-requests-limit: 10
    labels: [dependencies, server]
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"
      sentry:
        patterns:
          - "@sentry/*"

  # Client dependencies
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    open-pull-requests-limit: 10
    labels: [dependencies, client]
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"

  # Root (husky, lint-staged)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    open-pull-requests-limit: 5
    labels: [dependencies, tooling]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    labels: [dependencies, ci]

  # Docker base images
  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    labels: [dependencies, docker]
